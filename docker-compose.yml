services:
  avito-mcp:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - avito-mcp-data:/data
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  avito-mcp-data:
